name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://gate-monitor-yhab.onrender.com
          echo "Render pinged"
