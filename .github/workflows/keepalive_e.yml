name: Keep Render Alive E

on:
  schedule:
    - cron: '4,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://gate-monitor-1.onrender.com)
            echo "Ping $i: $CODE"
            sleep 2
          done
